<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スニーカーピックアップリスト</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="max-w-2xl mx-auto p-4 md:p-8">
        <header class="flex items-center justify-between mb-8 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div>
                <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">👟 Shoe Pick List</h1>
                <p class="text-sm text-gray-500 mt-1">お気に入りの靴をストックしよう</p>
            </div>
            <div id="user-info" class="text-xs text-gray-400">Loading...</div>
        </header>

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-8">
            <form id="shoe-form" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-gray-700">🏷️ 靴の名前</label>
                        <input type="text" id="shoe-name" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none" required>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-gray-700">¥ 値段</label>
                        <input type="number" id="shoe-price" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none" required>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-medium text-gray-700">📷 写真</label>
                    <label class="block">
                        <div id="image-dropzone" class="w-full h-32 border-2 border-dashed border-gray-200 rounded-xl flex items-center justify-center bg-gray-50 cursor-pointer overflow-hidden">
                            <div id="preview-placeholder" class="text-gray-400 text-xs">画像をアップロード</div>
                            <img id="image-preview" src="" class="hidden w-full h-full object-cover">
                        </div>
                        <input type="file" id="shoe-image" accept="image/*" class="hidden">
                    </label>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all">リストに追加</button>
            </form>
        </section>

        <section class="space-y-4">
            <h2 id="list-count" class="text-lg font-bold text-gray-800 px-2">マイリスト (0)</h2>
            <div id="shoe-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // GitHub Actionsがデプロイ時にここをSecretsの値に書き換えます
        const firebaseConfig = {
            apiKey: "SEC_FIREBASE_API_KEY",
            authDomain: "SEC_FIREBASE_AUTH_DOMAIN",
            projectId: "SEC_FIREBASE_PROJECT_ID",
            storageBucket: "SEC_FIREBASE_STORAGE_BUCKET",
            messagingSenderId: "SEC_FIREBASE_MESSAGING_SENDER_ID",
            appId: "SEC_FIREBASE_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "shoe-list-app"; 

        let currentUser = null;
        let imageBase64 = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('user-info').textContent = `User: ${user.uid.substring(0, 8)}`;
                setupListener();
            } else {
                signInAnonymously(auth);
            }
        });

        // 画像選択
        document.getElementById('shoe-image').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    imageBase64 = event.target.result;
                    document.getElementById('image-preview').src = imageBase64;
                    document.getElementById('image-preview').classList.remove('hidden');
                    document.getElementById('preview-placeholder').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        function setupListener() {
            // パスを簡略化（自分のFirebase用）
            const shoesCol = collection(db, 'shoes');
            onSnapshot(shoesCol, (snapshot) => {
                const shoes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                shoes.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                render(shoes);
            });
        }

        function render(shoes) {
            document.getElementById('list-count').textContent = `マイリスト (${shoes.length})`;
            const list = document.getElementById('shoe-list');
            list.innerHTML = shoes.map(shoe => `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="h-40 relative">
                        <img src="${shoe.image}" class="w-full h-full object-cover">
                        <button onclick="window.del('${shoe.id}')" class="absolute top-2 right-2 p-2 bg-white/80 rounded-full text-red-500">🗑️</button>
                    </div>
                    <div class="p-3">
                        <div class="font-bold truncate">${shoe.name}</div>
                        <div class="text-blue-600 font-bold text-sm">¥${Number(shoe.price).toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('shoe-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;
            const name = document.getElementById('shoe-name').value;
            const price = document.getElementById('shoe-price').value;
            await addDoc(collection(db, 'shoes'), {
                name, price: Number(price), image: imageBase64, createdAt: serverTimestamp()
            });
            e.target.reset();
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('preview-placeholder').classList.remove('hidden');
            imageBase64 = null;
        });

        window.del = (id) => deleteDoc(doc(db, 'shoes', id));
    </script>
</body>
</html>
</html>
